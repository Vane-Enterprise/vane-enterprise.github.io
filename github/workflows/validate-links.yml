name: Validate External Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-links:
    runs-on: ubuntu-latest
    name: Check HTML Link Integrity
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install html5lib beautifulsoup4 requests

      - name: Validate HTML structure
        run: |
          python -c "
          import html.parser
          import sys
          from pathlib import Path
          
          files = list(Path('.').rglob('*.html'))
          if not files:
              print('✅ No HTML files found to validate')
              sys.exit(0)
          
          for file in files:
              try:
                  with open(file, 'r') as f:
                      html.parser.HTMLParser().feed(f.read())
                  print(f'✅ {file} - Valid HTML')
              except Exception as e:
                  print(f'❌ {file} - Invalid HTML: {e}')
                  sys.exit(1)
          "

      - name: Extract and validate links
        run: |
          python3 << 'EOF'
          import re
          from pathlib import Path
          
          # Define allowed link patterns
          ALLOWED_PATTERNS = [
              r'https://github\.com/apps/vane-guard-sovereign-orchestrator',
              r'https://github\.com/Vane-Enterprise',
              r'https://github\.com/Vane-Enterprise/vane-enterprise\.github\.io',
              r'https://docs\.github\.com',
              r'^/.*',  # relative links
              r'#.*',   # anchor links
          ]
          
          FORBIDDEN_PATTERNS = [
              r'https://github\.com/?$',  # Generic GitHub homepage without context
          ]
          
          html_files = list(Path('.').rglob('*.html'))
          if not html_files:
              html_files = list(Path('.').glob('VANE-ENTERPRISE-LLC'))
          
          issues = []
          
          for file in html_files:
              with open(file, 'r', encoding='utf-8') as f:
                  content = f.read()
                  
              # Extract all href values
              links = re.findall(r'href=["\']([^"\']+)["\']', content)
              
              for link in links:
                  # Check forbidden patterns first
                  is_forbidden = any(re.match(pattern, link) for pattern in FORBIDDEN_PATTERNS)
                  if is_forbidden:
                      issues.append(f'{file}: Forbidden/unverified link: {link}')
                      continue
                  
                  # Check if link is in allowed patterns
                  is_allowed = any(re.match(pattern, link) for pattern in ALLOWED_PATTERNS)
                  if not is_allowed:
                      issues.append(f'{file}: Unverified external link detected: {link}')
          
          if issues:
              print('❌ Link validation FAILED:')
              for issue in issues:
                  print(f'  - {issue}')
              exit(1)
          else:
              print('✅ All links are verified and properly formed')
              exit(0)
          EOF

      - name: Validate aria-labels and accessibility
        run: |
          python3 << 'EOF'
          import re
          from pathlib import Path
          
          # Check for required accessibility attributes
          REQUIRED_CHECKS = {
              r'<a.*href.*class="btn"': 'aria-label',  # CTA buttons need aria-labels
              r'<span.*class="badge"': 'aria-label',    # Badges need aria-labels
          }
          
          html_files = list(Path('.').rglob('*.html'))
          if not html_files:
              html_files = list(Path('.').glob('VANE-ENTERPRISE-LLC'))
          
          accessibility_issues = []
          
          for file in html_files:
              with open(file, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Check for external links without rel="noopener noreferrer"
              external_links = re.findall(r'<a[^>]*href=["\']https://[^"\'>]*["\'][^>]*>', content)
              for link in external_links:
                  if 'github.com' in link and 'rel="noopener noreferrer"' not in link:
                      accessibility_issues.append(f'{file}: External link missing rel="noopener noreferrer": {link[:80]}...')
              
              # Check for required focus styles
              if 'outline: 2px solid' not in content:
                  print('⚠️ Warning: No focus styles detected for keyboard navigation')
          
          if accessibility_issues:
              print('❌ Accessibility checks FAILED:')
              for issue in accessibility_issues:
                  print(f'  - {issue}')
              exit(1)
          else:
              print('✅ Accessibility checks passed')
              exit(0)
          EOF

      - name: Report validation results
        if: always()
        run: |
          echo "## Link Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ HTML structure validated" >> $GITHUB_STEP_SUMMARY
          echo "✅ External links verified" >> $GITHUB_STEP_SUMMARY
          echo "✅ Accessibility attributes checked" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Checked Links:**" >> $GITHUB_STEP_SUMMARY
          echo "- Marketplace app URL: https://github.com/apps/vane-guard-sovereign-orchestrator" >> $GITHUB_STEP_SUMMARY
          echo "- Organization URL: https://github.com/Vane-Enterprise" >> $GITHUB_STEP_SUMMARY
          echo "- Repository URL: https://github.com/Vane-Enterprise/vane-enterprise.github.io" >> $GITHUB_STEP_SUMMARY
