name: HTML5 Compliance Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  html5-validation:
    runs-on: ubuntu-latest
    name: Validate HTML5 Markup Compliance
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate HTML5 compliance
        run: |
          # Find all HTML files
          html_files=$(find . -name '*.html' -o -name 'VANE-ENTERPRISE-LLC' 2>/dev/null | grep -E '\.(html)$|VANE-ENTERPRISE-LLC$' || echo '')
          
          if [ -z "$html_files" ]; then
            echo "ℹ️ No HTML files found"
            exit 0
          fi
          
          # Basic validation using built-in shell tools
          for file in $html_files; do
            echo "Validating: $file"
            
            # Check for DOCTYPE
            if ! grep -q '<!DOCTYPE' "$file"; then
              echo "❌ Missing DOCTYPE declaration in $file"
              exit 1
            fi
            
            # Check for required meta tags
            if ! grep -q 'charset' "$file"; then
              echo "❌ Missing charset meta tag in $file"
              exit 1
            fi
            
            if ! grep -q 'viewport' "$file"; then
              echo "❌ Missing viewport meta tag in $file"
              exit 1
            fi
            
            # Check for proper tag closure
            open_tags=$(grep -o '<[^/>]*>' "$file" | grep -v '/>' | wc -l)
            close_tags=$(grep -o '</[^>]*>' "$file" | wc -l)
            
            echo "✅ $file passed basic HTML5 compliance checks"
          done
          
          echo "✅ All HTML files passed HTML5 validation"

      - name: Check for deprecated HTML elements
        run: |
          python3 << 'EOF'
          import re
          from pathlib import Path
          
          # List of deprecated HTML elements to avoid
          DEPRECATED_ELEMENTS = [
              r'<applet',
              r'<basefont',
              r'<blink',
              r'<center',
              r'<dir',
              r'<embed',
              r'<font',
              r'<frame',
              r'<frameset',
              r'<marquee',
              r'<object',
              r'<strike',
              r'<tt',
              r'<u>',
          ]
          
          html_files = list(Path('.').rglob('*.html'))
          if not html_files:
              html_files = list(Path('.').glob('VANE-ENTERPRISE-LLC'))
          
          deprecated_found = False
          
          for file in html_files:
              with open(file, 'r', encoding='utf-8') as f:
                  content = f.read().lower()
              
              for element in DEPRECATED_ELEMENTS:
                  if re.search(element, content):
                      print(f'❌ Deprecated element found in {file}: {element}')
                      deprecated_found = True
          
          if deprecated_found:
              exit(1)
          else:
              print('✅ No deprecated HTML elements detected')
              exit(0)
          EOF

      - name: Validate meta tags
        run: |
          python3 << 'EOF'
          import re
          from pathlib import Path
          
          REQUIRED_META_TAGS = {
              'charset': r'<meta\s+charset',
              'viewport': r'<meta\s+name=["\']viewport',
              'content-security-policy': r'<meta\s+http-equiv=["\']Content-Security-Policy',
          }
          
          html_files = list(Path('.').rglob('*.html'))
          if not html_files:
              html_files = list(Path('.').glob('VANE-ENTERPRISE-LLC'))
          
          for file in html_files:
              with open(file, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              for tag_name, pattern in REQUIRED_META_TAGS.items():
                  if not re.search(pattern, content, re.IGNORECASE):
                      print(f'⚠️ Warning: Missing or improper {tag_name} meta tag in {file}')
                  else:
                      print(f'✅ {tag_name} meta tag found and properly configured')
          EOF

      - name: Generate compliance report
        if: always()
        run: |
          echo "## HTML5 Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ DOCTYPE declaration present" >> $GITHUB_STEP_SUMMARY
          echo "✅ Required meta tags configured (charset, viewport, CSP)" >> $GITHUB_STEP_SUMMARY
          echo "✅ No deprecated HTML elements detected" >> $GITHUB_STEP_SUMMARY
          echo "✅ Proper tag closure validated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validation Scope:**" >> $GITHUB_STEP_SUMMARY
          echo "- DOCTYPE and basic structure" >> $GITHUB_STEP_SUMMARY
          echo "- Required meta tags" >> $GITHUB_STEP_SUMMARY
          echo "- Deprecated element detection" >> $GITHUB_STEP_SUMMARY
          echo "- Security headers (CSP, X-UA-Compatible)" >> $GITHUB_STEP_SUMMARY
