name: "Code Quality and Coverage"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Runs weekly on Sundays

jobs:
  analyze-and-test:
    name: Code Quality & Python Coverage
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

            # Install your dependencies and testing packages
    - name: Install dependencies
      run: |
        pip install pytest pytest-cov

    # Run Python tests and generate a coverage report
    - name: Run Python tests with coverage
      run: |
        pytest --cov=./ --cov-report=xml

    # Initializes the default CodeQL code quality query suites
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'javascript-typescript' # Handles your index.html / frontend scripts

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
